<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập thất bại</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 80px 20px;
            background-color: #fff5f5;
            color: #b00020;
        }

        .logo {
            width: 60px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #b00020;
        }

        p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #5c0000;
        }

        .button {
            background-color: #b00020;
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .button:hover {
            background-color: #8c0018;
        }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/6/68/Logo_FPT_Education.png" style="width: 10%" class="logo" alt="App Logo" />

    <h1>Login Failed</h1>
    <p>{{ message }}</p>
</body>
</html>
